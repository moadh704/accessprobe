# AccessProbe Example Configuration (Recommended style)

sessions:
  - name: user
    cookie_file: cookies/user.txt          # Load cookies from file (cleaner)
    description: "Low privilege user account"

  - name: admin
    cookie_file: cookies/admin.txt
    description: "Administrator account"

scan:
  target:
    url: "https://vulnerable-app.example.com/profile"
    description: "User profile endpoint"

  original_role: user
  test_roles:
    - admin

  parameters:
    - name: user_id
      location: query
      value: "42"

# You can still use raw cookies if preferred:
#  - name: user
#    cookies:
#      session: "your_cookie_here"
